<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details | PustiGen</title>
  <meta name="description" content="View PustiGen product details, nutrition benefits, and order via WhatsApp or instant form." />
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><img src="logo.png" alt="PustiGen logo" /><span>PustiGen</span></a>
    <button class="menu-btn" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="section">
    <div class="product-layout">
      <div>
        <img class="product-main-image" id="product-main-image" alt="Product image" />
        <div class="thumbs" id="thumbs"></div>
      </div>
      <div class="product-details">
        <h1 id="product-title"></h1>
        <p class="price" id="product-price"></p>
        <p id="product-description"></p>

        <h3>Nutritional Benefits</h3>
        <ul id="benefits"></ul>

        <label for="qty">Quantity</label>
        <div class="qty-row">
          <button class="btn ghost" id="minus">-</button>
          <input id="qty" type="number" min="1" value="1" />
          <button class="btn ghost" id="plus">+</button>
        </div>

        <div class="cta-row">
          <button class="btn" id="add-cart">Add to Cart</button>
          <button class="btn alt" id="buy-now">Buy Now</button>
        </div>
        <div class="cta-row">
          <a class="btn whatsapp" id="whatsapp-order" target="_blank" rel="noopener">Order on WhatsApp</a>
          <a class="btn call" href="tel:+8801351004652">Call Now</a>
        </div>
        <p class="small">* Buy Now sends order to Google Sheet + opens WhatsApp confirmation.</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> PustiGen. All rights reserved.</p>
  </footer>
  <script src="app.js" defer></script>
</body>
</html>
