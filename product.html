<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PustiGen Product</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="product-page">

  <div class="product-image-wrap">
    <img id="product-image" src="" alt="Product">
  </div>

  <div class="product-info">

    <h1 id="product-name"></h1>

    <div class="price" id="product-price"></div>

    <p id="product-description"></p>

    <div class="qty-box">
      <button onclick="changeQty(-1)">-</button>
      <span id="qty">1</span>
      <button onclick="changeQty(1)">+</button>
    </div>

    <div class="action-buttons">

      <a id="wa-order" target="_blank" class="primary-btn">Order on WhatsApp</a>

      <a href="tel:01351004652" class="secondary-btn">Call Now</a>

    </div>

    <div class="order-form">
      <h3>Quick Order</h3>

      <form action="https://formsubmit.co/pustigen@gmail.com" method="POST">

        <input type="hidden" name="Product" id="hidden-product">

        <input type="text" name="Name" placeholder="Your Name" required>

        <input type="text" name="Phone" placeholder="Phone Number" required>

        <textarea name="Address" placeholder="Delivery Address"></textarea>

        <button type="submit" class="primary-btn full-btn">Submit Order</button>
      </form>
    </div>

  </div>

</div>

<script>
let qty = 1;

function changeQty(num){
  qty += num;

  if(qty < 1) qty = 1;

  document.getElementById('qty').innerText = qty;
}

const params = new URLSearchParams(window.location.search);
const productId = params.get('id');

fetch('products.json')
.then(res => res.json())
.then(products => {

  const product = products.find(p => p.id == productId);

  if(!product) return;

  document.getElementById('product-image').src = product.image;
  document.getElementById('product-name').innerText = product.name;
  document.getElementById('product-price').innerText = '৳' + product.price;
  document.getElementById('product-description').innerText = product.description;

  document.getElementById('hidden-product').value = product.name;

  const waMessage = encodeURIComponent(
    `Hello PustiGen,%0A%0AProduct: ${product.name}%0AQuantity: ${qty}`
  );

  document.getElementById('wa-order').href =
    `https://wa.me/8801351004652?text=${waMessage}`;
});
</script>

</body>
</html>
